<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hoops Made Simple — Coach</title>
<style>
  :root{
    --bg:#f5f7f9;--surface:#fff;--border:#e4e9ef;--field:#fff;--text:#16233a;--muted:#64748b;
    --accent:#0e8a9e;--accent-ink:#fff;--accent-soft:rgba(14,138,158,.1);--danger:#dc2626;--success:#0e9f6e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:880px;margin:0 auto;padding:0 18px}
  header.bar{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  header.bar .wrap{display:flex;align-items:center;gap:10px;height:58px}
  header.bar img{width:30px;height:30px;object-fit:contain}
  header.bar .title{font-weight:800;font-size:17px;letter-spacing:-.01em}
  header.bar .spacer{flex:1}
  header.bar .who{color:var(--muted);font-size:13px}
  .btn{background:var(--accent);color:var(--accent-ink);border:none;border-radius:9px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn:disabled{opacity:.55;cursor:default}
  .btn.sm{padding:6px 10px;font-size:13px;border-radius:8px}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--border)}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--border)}
  .field,select,textarea{width:100%;background:var(--field);border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:14px;color:var(--text);font-family:inherit;outline:none}
  .field:focus,select:focus,textarea:focus{border-color:var(--accent)}
  label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:0 0 5px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>div{flex:1;min-width:130px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin:16px 0}
  .muted{color:var(--muted)}
  .err{color:var(--danger);font-size:13px;min-height:17px;margin-top:6px}
  .center{min-height:80vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}
  .tabs{display:flex;gap:8px;margin:18px 0 4px}
  .tab{padding:8px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-weight:700;font-size:14px;cursor:pointer;color:var(--muted)}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--border);border-radius:11px;background:var(--surface);margin-bottom:9px}
  .item .grow{flex:1;min-width:0}
  .item .name{font-weight:700}
  .item .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px}
  .pill.pub{background:var(--accent-soft);color:var(--accent)}
  .pill.draft{background:#fff3cd;color:#8a6d00}
  .hide{display:none!important}
  .check{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
  .check input{width:auto}
  h2{font-size:20px;letter-spacing:-.01em}
  h3{font-size:15px;margin-bottom:12px}
  .drillpick{max-height:200px;overflow:auto;border:1px solid var(--border);border-radius:9px;padding:6px}
  .drillpick label{display:flex;align-items:center;gap:8px;font-weight:600;color:var(--text);padding:6px;cursor:pointer}
  .drillpick input{width:auto}
  small.help{color:var(--muted);font-size:12px}
</style>
</head>
<body>

<div id="login" class="hide">
  <div class="wrap center">
    <img src="logo.png" width="64" height="64" alt="" style="object-fit:contain" />
    <h2 style="margin-top:14px">Hoops Made Simple — Coach</h2>
    <div class="muted" style="margin-top:4px">Sign in to manage drills &amp; workouts</div>
    <div class="card" style="width:100%;max-width:360px;text-align:left">
      <label>Email</label>
      <input id="li-email" class="field" type="email" autocomplete="username" />
      <label style="margin-top:12px">Password</label>
      <input id="li-pass" class="field" type="password" autocomplete="current-password" />
      <div id="li-err" class="err"></div>
      <button id="li-go" class="btn" style="width:100%">Sign In</button>
      <button id="li-su" class="btn ghost" style="width:100%;margin-top:8px">Create account</button>
    </div>
  </div>
</div>

<div id="notadmin" class="hide">
  <div class="wrap center">
    <h2>Almost there</h2>
    <div class="muted" style="max-width:420px;margin-top:8px;line-height:1.5">
      You're signed in, but this account isn't an admin yet. Send this ID to your developer to be granted access:
    </div>
    <div class="card" style="font-family:monospace;user-select:all" id="na-uid"></div>
    <button id="na-out" class="btn ghost">Sign out</button>
  </div>
</div>

<div id="app" class="hide">
  <header class="bar"><div class="wrap">
    <img src="logo.png" alt="" /><span class="title">Coach</span>
    <span class="spacer"></span>
    <span class="who" id="who"></span>
    <button id="signout" class="btn ghost sm">Sign out</button>
  </div></header>
  <div class="wrap">
    <div class="tabs">
      <div class="tab on" data-tab="workouts">Workouts</div>
      <div class="tab" data-tab="drills">Drills</div>
    </div>

    <!-- WORKOUTS -->
    <section id="t-workouts">
      <div class="card">
        <h3 id="w-formtitle">New workout</h3>
        <input type="hidden" id="w-id" />
        <div class="row">
          <div><label>Name</label><input id="w-name" class="field" placeholder="e.g. Ball Handling A" /></div>
          <div><label>Difficulty</label>
            <select id="w-diff"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select>
          </div>
        </div>
        <label style="margin-top:12px">Description</label>
        <textarea id="w-desc" rows="2" placeholder="What this workout focuses on"></textarea>
        <label style="margin-top:12px">Drills (in order)</label>
        <div class="drillpick" id="w-drills"><small class="help">Add drills first, then pick them here.</small></div>
        <div style="display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap">
          <label class="check"><input type="checkbox" id="w-pub" checked /> Published (visible in app)</label>
          <span class="spacer" style="flex:1"></span>
          <button id="w-cancel" class="btn ghost hide">Cancel</button>
          <button id="w-save" class="btn">Save workout</button>
        </div>
        <div id="w-err" class="err"></div>
      </div>
      <div id="w-list"></div>
    </section>

    <!-- DRILLS -->
    <section id="t-drills" class="hide">
      <div class="card">
        <h3 id="d-formtitle">New drill</h3>
        <input type="hidden" id="d-id" />
        <div class="row">
          <div><label>Name</label><input id="d-name" class="field" placeholder="e.g. Crossover Pull" /></div>
          <div><label>Points</label><input id="d-points" class="field" type="number" value="10" /></div>
        </div>
        <label style="margin-top:12px">Description</label>
        <textarea id="d-desc" rows="2" placeholder="How to do it"></textarea>
        <div class="row" style="margin-top:12px">
          <div><label>Reps</label><input id="d-reps" class="field" type="number" placeholder="e.g. 10" /></div>
          <div><label>Sets</label><input id="d-sets" class="field" type="number" placeholder="e.g. 3" /></div>
          <div><label>Duration (sec)</label><input id="d-dur" class="field" type="number" placeholder="e.g. 60" /></div>
        </div>
        <label style="margin-top:12px">Video URL (YouTube link, optional)</label>
        <input id="d-video" class="field" placeholder="https://youtube.com/watch?v=..." />
        <div style="display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap">
          <label class="check"><input type="checkbox" id="d-pub" checked /> Published</label>
          <span class="spacer" style="flex:1"></span>
          <button id="d-cancel" class="btn ghost hide">Cancel</button>
          <button id="d-save" class="btn">Save drill</button>
        </div>
        <div id="d-err" class="err"></div>
      </div>
      <div id="d-list"></div>
    </section>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var show=function(id){["login","notadmin","app"].forEach(function(s){$(s).classList.toggle("hide",s!==id);});};

  firebase.initializeApp(window.FIREBASE_CONFIG);
  var auth=firebase.auth(), db=firebase.firestore();
  var drillsCache=[];

  // ---- Auth ----
  $("li-go").onclick=function(){ doAuth(false); };
  $("li-su").onclick=function(){ doAuth(true); };
  function doAuth(signup){
    var e=$("li-email").value.trim(), p=$("li-pass").value;
    if(!e||!p){ $("li-err").textContent="Enter email and password."; return; }
    $("li-err").textContent="";
    var fn=signup?auth.createUserWithEmailAndPassword(e,p):auth.signInWithEmailAndPassword(e,p);
    fn.catch(function(err){ $("li-err").textContent=friendly(err); });
  }
  function friendly(err){
    var c=(err&&err.code)||"";
    if(c.indexOf("wrong-password")>=0||c.indexOf("invalid-credential")>=0)return "Incorrect email or password.";
    if(c.indexOf("email-already-in-use")>=0)return "That email already has an account — sign in instead.";
    if(c.indexOf("user-not-found")>=0)return "No account yet — tap Create account.";
    if(c.indexOf("weak-password")>=0)return "Password must be 6+ characters.";
    return (err&&err.message)||"Something went wrong.";
  }
  $("signout").onclick=$("na-out").onclick=function(){ auth.signOut(); };

  auth.onAuthStateChanged(function(user){
    if(!user){ show("login"); return; }
    // admin gate: only admins can read /admin-users/{uid}
    db.collection("admin-users").doc(user.uid).get().then(function(snap){
      if(snap.exists){ $("who").textContent=user.email; bootApp(); show("app"); }
      else { $("na-uid").textContent=user.uid; show("notadmin"); }
    }).catch(function(){ $("na-uid").textContent=user.uid; show("notadmin"); });
  });

  // ---- Tabs ----
  Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(t){
    t.onclick=function(){
      document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});
      t.classList.add("on");
      var k=t.getAttribute("data-tab");
      $("t-workouts").classList.toggle("hide",k!=="workouts");
      $("t-drills").classList.toggle("hide",k!=="drills");
    };
  });

  function bootApp(){ listenDrills(); listenWorkouts(); }

  // ---- Drills ----
  function listenDrills(){
    db.collection("drills").orderBy("name").onSnapshot(function(qs){
      drillsCache=[]; var html="";
      qs.forEach(function(doc){
        var d=doc.data(); d.id=doc.id; drillsCache.push(d);
        html+='<div class="item"><div class="grow"><div class="name">'+esc(d.name)+
          ' <span class="pill '+(d.published?'pub">Published':'draft">Draft')+'</span></div>'+
          '<div class="sub">'+(d.points||0)+' pts'+(d.reps?' · '+d.reps+' reps':'')+(d.sets?' × '+d.sets+' sets':'')+(d.videoUrl?' · 🎬 video':'')+'</div></div>'+
          '<button class="btn ghost sm" data-edit="'+doc.id+'">Edit</button>'+
          '<button class="btn danger sm" data-del="'+doc.id+'">Delete</button></div>';
      });
      $("d-list").innerHTML=html||'<div class="muted" style="padding:8px">No drills yet — add one above.</div>';
      bindRow("d-list", editDrill, function(id){ del("drills",id); });
      renderDrillPicker();
    });
  }
  $("d-save").onclick=function(){
    var name=$("d-name").value.trim();
    if(!name){ $("d-err").textContent="Name is required."; return; }
    $("d-err").textContent="";
    var data={
      name:name, description:$("d-desc").value.trim()||null,
      videoUrl:$("d-video").value.trim()||null,
      videoProvider:$("d-video").value.indexOf("youtu")>=0?"youtube":null,
      thumbnailUrl:null,
      reps:numOrNull($("d-reps").value), sets:numOrNull($("d-sets").value),
      durationSeconds:numOrNull($("d-dur").value),
      tags:[], points:numOrNull($("d-points").value)||0,
      published:$("d-pub").checked, updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    };
    var id=$("d-id").value;
    var p=id?db.collection("drills").doc(id).set(data,{merge:true})
            :db.collection("drills").add(Object.assign({createdAt:firebase.firestore.FieldValue.serverTimestamp()},data));
    p.then(resetDrill).catch(function(e){ $("d-err").textContent=e.message; });
  };
  function editDrill(id){
    var d=find(drillsCache,id); if(!d)return;
    $("d-id").value=id; $("d-name").value=d.name||""; $("d-desc").value=d.description||"";
    $("d-reps").value=d.reps||""; $("d-sets").value=d.sets||""; $("d-dur").value=d.durationSeconds||"";
    $("d-video").value=d.videoUrl||""; $("d-points").value=d.points||0; $("d-pub").checked=d.published!==false;
    $("d-formtitle").textContent="Edit drill"; $("d-cancel").classList.remove("hide");
    $("d-name").scrollIntoView({behavior:"smooth",block:"center"});
  }
  $("d-cancel").onclick=resetDrill;
  function resetDrill(){
    $("d-id").value="";["d-name","d-desc","d-reps","d-sets","d-dur","d-video"].forEach(function(i){$(i).value="";});
    $("d-points").value=10; $("d-pub").checked=true; $("d-formtitle").textContent="New drill"; $("d-cancel").classList.add("hide"); $("d-err").textContent="";
  }

  // ---- Workouts ----
  function listenWorkouts(){
    db.collection("workouts").orderBy("name").onSnapshot(function(qs){
      var html="";
      qs.forEach(function(doc){
        var w=doc.data();
        var n=(w.orderedDrillIds||[]).length;
        html+='<div class="item"><div class="grow"><div class="name">'+esc(w.name)+
          ' <span class="pill '+(w.published?'pub">Published':'draft">Draft')+'</span></div>'+
          '<div class="sub">'+(w.difficulty||'')+' · '+n+' drill'+(n===1?'':'s')+'</div></div>'+
          '<button class="btn ghost sm" data-edit="'+doc.id+'">Edit</button>'+
          '<button class="btn danger sm" data-del="'+doc.id+'">Delete</button></div>';
      });
      $("w-list").innerHTML=html||'<div class="muted" style="padding:8px">No workouts yet — build one above.</div>';
      bindRow("w-list", function(id){ editWorkout(id); }, function(id){ del("workouts",id); });
    });
  }
  function renderDrillPicker(){
    if(!drillsCache.length){ $("w-drills").innerHTML='<small class="help">Add drills first, then pick them here.</small>'; return; }
    var sel={}; document.querySelectorAll('#w-drills input:checked').forEach(function(c){sel[c.value]=true;});
    $("w-drills").innerHTML=drillsCache.map(function(d){
      return '<label><input type="checkbox" value="'+d.id+'"'+(sel[d.id]?' checked':'')+' /> '+esc(d.name)+'</label>';
    }).join("");
  }
  $("w-save").onclick=function(){
    var name=$("w-name").value.trim();
    if(!name){ $("w-err").textContent="Name is required."; return; }
    var ids=[]; document.querySelectorAll('#w-drills input:checked').forEach(function(c){ ids.push(c.value); });
    var pts=0; ids.forEach(function(id){ var d=find(drillsCache,id); if(d)pts+=(d.points||0); });
    $("w-err").textContent="";
    var data={
      name:name, description:$("w-desc").value.trim()||null,
      orderedDrillIds:ids, totalPoints:pts, difficulty:$("w-diff").value,
      tags:[], scheduleRule:null, reminderTime:null,
      published:$("w-pub").checked, updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    };
    var id=$("w-id").value;
    var p=id?db.collection("workouts").doc(id).set(data,{merge:true})
            :db.collection("workouts").add(Object.assign({createdAt:firebase.firestore.FieldValue.serverTimestamp()},data));
    p.then(resetWorkout).catch(function(e){ $("w-err").textContent=e.message; });
  };
  function editWorkout(id){
    db.collection("workouts").doc(id).get().then(function(snap){
      if(!snap.exists)return; var w=snap.data();
      $("w-id").value=id; $("w-name").value=w.name||""; $("w-desc").value=w.description||"";
      $("w-diff").value=w.difficulty||"Beginner"; $("w-pub").checked=w.published!==false;
      renderDrillPicker();
      var ids=w.orderedDrillIds||[];
      document.querySelectorAll('#w-drills input').forEach(function(c){ c.checked=ids.indexOf(c.value)>=0; });
      $("w-formtitle").textContent="Edit workout"; $("w-cancel").classList.remove("hide");
      $("w-name").scrollIntoView({behavior:"smooth",block:"center"});
    });
  }
  $("w-cancel").onclick=resetWorkout;
  function resetWorkout(){
    $("w-id").value=""; $("w-name").value=""; $("w-desc").value=""; $("w-diff").value="Beginner"; $("w-pub").checked=true;
    document.querySelectorAll('#w-drills input').forEach(function(c){c.checked=false;});
    $("w-formtitle").textContent="New workout"; $("w-cancel").classList.add("hide"); $("w-err").textContent="";
  }

  // ---- helpers ----
  function del(coll,id){ if(confirm("Delete this "+coll.slice(0,-1)+"?")) db.collection(coll).doc(id)["delete"](); }
  function bindRow(listId, onEdit, onDel){
    $(listId).querySelectorAll("[data-edit]").forEach(function(b){ b.onclick=function(){ onEdit(b.getAttribute("data-edit")); }; });
    $(listId).querySelectorAll("[data-del]").forEach(function(b){ b.onclick=function(){ onDel(b.getAttribute("data-del")); }; });
  }
  function find(arr,id){ for(var i=0;i<arr.length;i++) if(arr[i].id===id) return arr[i]; return null; }
  function numOrNull(v){ v=parseInt(v,10); return isNaN(v)?null:v; }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
})();
</script>
</body>
</html>
